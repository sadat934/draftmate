<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DraftMate</title>
    <link rel="stylesheet" href="./taskpane.css">
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script type="module" src="./taskpane.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="../assets/logo.svg" alt="" width="32" height="32">
          <div>
            <h1>DraftMate</h1>
            <p id="planLabel">Free plan</p>
          </div>
        </div>
        <button id="logoutButton" class="icon-button" title="Sign out" aria-label="Sign out">↪</button>
      </header>

      <section id="counterMount"></section>

      <section class="tool-strip" aria-label="Writing tools">
        <button data-action="rewrite" class="tool-button active">Rewrite</button>
        <button data-action="grammar" class="tool-button">Grammar</button>
        <button data-action="summarize" class="tool-button">Summarize</button>
        <button data-action="headings" class="tool-button">Auto-Label</button>
      </section>

      <section class="selection-panel">
        <div class="section-heading">
          <h2>Selection</h2>
          <button id="refreshSelection" class="text-button">Refresh</button>
        </div>
        <textarea id="selectionText" readonly placeholder="Select text in Word, then refresh. For summaries and auto-labeling, DraftMate can also read the full document."></textarea>
      </section>

      <section id="promptMount"></section>
      <section id="resultMount"></section>
      <section id="upgradeMount"></section>

      <section class="settings-panel">
        <details>
          <summary>BYO API key</summary>
          <label for="byoProvider">Provider</label>
          <select id="byoProvider">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic Claude</option>
            <option value="mistral">Mistral AI</option>
            <option value="gemini">Google Gemini</option>
            <option value="openrouter">OpenRouter</option>
            <option value="custom">Custom (OpenAI-compatible)</option>
          </select>
          <label for="byoKey">API key</label>
          <input id="byoKey" type="password" autocomplete="off" placeholder="Stored only in this browser">
          <div id="customFields" style="display: none;">
            <label for="byoModel">Model name</label>
            <input id="byoModel" type="text" placeholder="e.g., gpt-4, claude-3-5-sonnet-latest">
            <label for="byoEndpoint">API endpoint (optional)</label>
            <input id="byoEndpoint" type="text" placeholder="e.g., https://api.openai.com/v1/chat/completions">
          </div>
          <div class="row">
            <button id="saveByoKey" class="secondary-button">Save key</button>
            <button id="clearByoKey" class="ghost-button">Clear</button>
          </div>
        </details>
      </section>

      <footer>
        <a href="../payments/plans.html">Plans, trial, and payments</a>
      </footer>
    </main>
  </body>
</html>
